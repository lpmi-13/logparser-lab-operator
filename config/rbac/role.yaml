---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - lab.learning.io
  resources:
  - logparserlabs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - lab.learning.io
  resources:
  - logparserlabs/finalizers
  verbs:
  - update
- apiGroups:
  - lab.learning.io
  resources:
  - logparserlabs/status
  verbs:
  - get
  - patch
  - update
