# This rule is not used by the project logparser-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the lab.learning.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: logparser-operator
    app.kubernetes.io/managed-by: kustomize
  name: logparserlab-editor-role
rules:
  - apiGroups:
      - lab.learning.io
    resources:
      - logparserlabs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - lab.learning.io
    resources:
      - logparserlabs/status
    verbs:
      - get
