# This rule is not used by the project logparser-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to lab.learning.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: logparser-operator
    app.kubernetes.io/managed-by: kustomize
  name: logparserlab-viewer-role
rules:
  - apiGroups:
      - lab.learning.io
    resources:
      - logparserlabs
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - lab.learning.io
    resources:
      - logparserlabs/status
    verbs:
      - get
